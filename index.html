<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>领航者空间站 - MOSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&family=Roboto+Mono:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', 'Roboto Mono', monospace;
            background-color: #050505;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        .cyber-grid {
            background-image: linear-gradient(to right, rgba(255, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .cyber-glow-red {
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8), 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .cyber-border-red {
            border: 1px solid rgba(255, 0, 0, 0.3);
            box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.1), 0 0 10px rgba(255, 0, 0, 0.1);
        }

        .moss-eye {
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6), inset 0 0 10px rgba(255, 0, 0, 0.8);
            background: radial-gradient(circle, #ff0000 10%, #440000 70%, #000000 100%);
        }

        .scanning-line {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #222;
            border: 1px solid #ff0000;
        }

        .app-scale {
            transform: scale(1.25);
            transform-origin: top center;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
    <link rel="stylesheet" href="/index.css">
</head>

<body class="cyber-grid min-h-screen relative">
    <div class="scanning-line"></div>
    <div id="root"></div>
    <!-- 背景音乐 - 默认不播放需交互启动 -->
    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
